<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a2233"/>
      <stop offset="60%" stop-color="#1a2e3a"/>
      <stop offset="100%" stop-color="#242727"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0052A0"/>
      <stop offset="100%" stop-color="#009EE2"/>
    </linearGradient>
    <linearGradient id="prizeBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2233"/>
      <stop offset="100%" stop-color="#091829"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#58C0EC" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="180" fill="#0052A0" opacity="0.08"/>
  <circle cx="1120" cy="550" r="220" fill="#009EE2" opacity="0.07"/>
  <circle cx="600" cy="315" r="400" fill="#f59e0b" opacity="0.025"/>

  <!-- Top blue accent bar -->
  <rect x="0" y="0" width="1200" height="7" fill="url(#blueGrad)"/>

  <!-- Bottom blue accent bar -->
  <rect x="0" y="623" width="1200" height="7" fill="url(#blueGrad)"/>

  <!-- Prize card -->
  <rect x="60" y="55" width="1080" height="310" rx="24" fill="url(#prizeBox)" opacity="0.95"/>
  <rect x="60" y="55" width="1080" height="310" rx="24" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <!-- gold top line on prize card -->
  <rect x="84" y="55" width="1032" height="4" rx="2" fill="url(#goldGrad)"/>

  <!-- Trophy icon (geometric) -->
  <g transform="translate(540, 95)" fill="#fbbf24" opacity="0.9">
    <rect x="-4" y="0" width="28" height="40" rx="3"/>
    <rect x="-14" y="0" width="10" height="26" rx="5"/>
    <rect x="24" y="0" width="10" height="26" rx="5"/>
    <rect x="-10" y="40" width="40" height="6" rx="3"/>
    <rect x="-6" y="46" width="32" height="6" rx="3"/>
  </g>

  <!-- PRIMER PREMIO -->
  <text x="600" y="118" text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900"
    fill="#fbbf24" letter-spacing="10" opacity="0.9">PRIMER PREMIO</text>

  <!-- $300.000 — the hero -->
  <text x="600" y="270" text-anchor="middle"
    font-family="Arial Black, Impact, Arial, sans-serif" font-size="148" font-weight="900"
    fill="url(#goldGrad)" filter="url(#goldGlow)" letter-spacing="-6">$300.000</text>

  <!-- en módulos de pantalla -->
  <text x="600" y="325" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="600"
    fill="#fcd34d" opacity="0.8" letter-spacing="2">en módulos de pantalla</text>

  <!-- Divider -->
  <line x1="200" y1="390" x2="1000" y2="390" stroke="#58C0EC" stroke-width="1" opacity="0.25"/>

  <!-- PRODE MUNDIAL 2026 -->
  <text x="600" y="460" text-anchor="middle"
    font-family="Arial Black, Impact, Arial, sans-serif" font-size="72" font-weight="900"
    fill="white" letter-spacing="-2" opacity="0.95">PRODE MUNDIAL 2026</text>

  <!-- USA · Canadá · México -->
  <text x="600" y="507" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="600"
    fill="#58C0EC" letter-spacing="3">USA  ·  CANADÁ  ·  MÉXICO</text>

  <!-- Comercial Antartica -->
  <text x="600" y="580" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400"
    fill="#a8c8d8" opacity="0.6" letter-spacing="1">COMERCIAL ANTARTICA</text>

  <!-- Decorative football shapes (hexagons) -->
  <g transform="translate(95, 490)" opacity="0.12" fill="#ffffff">
    <polygon points="30,0 60,17 60,51 30,68 0,51 0,17" />
    <polygon points="30,8 52,20 52,48 30,60 8,48 8,20" fill="#242727"/>
  </g>
  <g transform="translate(1055, 80)" opacity="0.1" fill="#ffffff">
    <polygon points="30,0 60,17 60,51 30,68 0,51 0,17" />
    <polygon points="30,8 52,20 52,48 30,60 8,48 8,20" fill="#0a2233"/>
  </g>

  <!-- Stars -->
  <g fill="#fbbf24" opacity="0.4">
    <polygon points="110,430 115,445 130,445 118,454 123,469 110,460 97,469 102,454 90,445 105,445" transform="scale(0.7) translate(40, 170)"/>
    <polygon points="110,430 115,445 130,445 118,454 123,469 110,460 97,469 102,454 90,445 105,445" transform="scale(0.5) translate(2000, 900)"/>
  </g>
</svg>
