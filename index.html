<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode Mundial 2026 · Antartica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #242727;
  --surface: #203643;
  --surface2: #1a2e3a;
  --surface3: #2a4050;
  --accent: #58C0EC;
  --accent2: #1E9CD8;
  --grad-start: #0052A0;
  --grad-end: #009EE2;
  --gold: #f59e0b;
  --red: #ef4444;
  --text: #FFFFFF;
  --text2: #a8c8d8;
  --border: rgba(88,192,236,.2);
  --r: 10px;
}
body { background: var(--bg); color: var(--text); font-family: 'Poppins', system-ui, sans-serif; min-height: 100vh; }

/* ── WELCOME ── */
#screen-welcome {
  min-height: 100vh; display: flex; align-items: center;
  justify-content: center; padding: 16px;
  background: radial-gradient(ellipse at top, #0a2a3d 0%, var(--bg) 65%);
}
.welcome-card {
  background: var(--surface); border: 1px solid rgba(88,192,236,.25);
  border-radius: 20px; padding: 36px 28px; max-width: 400px; width: 100%;
  text-align: center; box-shadow: 0 0 60px rgba(0,82,160,.3);
  position: relative; overflow: hidden;
}
.welcome-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
}
.welcome-title {
  font-size: 2rem; font-weight: 900; letter-spacing: -.5px;
  text-transform: uppercase; margin-bottom: 4px;
}
.welcome-title span {
  background: linear-gradient(90deg,var(--grad-start),var(--grad-end));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.welcome-sub { color: var(--text2); font-size: 0.78rem; letter-spacing: .06em; text-transform: uppercase; margin: 6px 0 28px; }
.divider { text-align: center; color: var(--text2); font-size: 0.75rem; margin: 14px 0; position: relative; }
.divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
.divider::before { left: 0; } .divider::after { right: 0; }

/* ── HEADER ── */
header {
  background: var(--surface); border-bottom: 1px solid rgba(88,192,236,.15);
  padding: 10px 16px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 100; overflow: hidden;
}
header::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
}
nav { display: flex; gap: 2px; }
.nav-btn {
  background: none; border: none; color: var(--text2);
  padding: 7px 13px; border-radius: 7px; cursor: pointer;
  font-size: 0.82rem; font-weight: 500; transition: all 0.15s; font-family: 'Poppins', sans-serif;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { color: var(--accent); background: rgba(88,192,236,.12); }

/* ── STATUS BAR ── */
#status-bar {
  background: var(--surface2); border-bottom: 1px solid rgba(88,192,236,.1);
  padding: 6px 16px; display: flex; align-items: center;
  justify-content: space-between; font-size: 0.78rem;
}
.status-name { color: var(--accent); font-weight: 700; }
.status-pts {
  background: linear-gradient(90deg,var(--grad-start),var(--grad-end));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;
}

/* ── MAIN ── */
main { max-width: 860px; margin: 0 auto; padding: 16px 16px 90px; }

/* ── CARDS ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px; margin-bottom: 12px;
}
.card-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: .1em; color: var(--text2); margin-bottom: 12px; font-weight: 600; }

/* ── STEP INDICATOR ── */
.step-bar {
  display: flex; gap: 0; margin-bottom: 20px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--r); overflow: hidden;
}
.step-btn {
  flex: 1; padding: 11px 4px; background: none; border: none;
  color: var(--text2); font-size: 0.72rem; font-weight: 600;
  cursor: pointer; transition: all .15s; font-family: 'Poppins', sans-serif;
  border-right: 1px solid var(--border); position: relative;
  text-transform: uppercase; letter-spacing: .04em;
}
.step-btn:last-child { border-right: none; }
.step-btn:hover { background: var(--surface2); color: var(--text); }
.step-btn.active { background: rgba(88,192,236,.12); color: var(--accent); }
.step-btn.done { color: var(--accent2); }
.step-btn.done::after { content: ' ✓'; font-size: 0.65rem; }
.step-num { display: block; font-size: 1rem; font-weight: 800; margin-bottom: 2px; }

/* ── QUALIFIER GRID ── */
.qualifier-counter {
  text-align: center; font-size: 0.88rem; color: var(--text2); margin-bottom: 14px;
}
.qualifier-counter b { color: var(--accent); font-size: 1.1rem; }
.qualifier-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-bottom: 16px;
}
.q-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 8px; text-align: center;
  cursor: pointer; transition: all .15s; font-size: 0.82rem; font-weight: 600;
  user-select: none;
}
.q-card:hover { border-color: var(--accent2); background: var(--surface3); }
.q-card.selected {
  background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
  border-color: var(--accent); color: white;
}
.q-card.result-correct { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,192,236,.3); }
.q-card.result-wrong { opacity: 0.5; }
.q-card.q-card-disabled { opacity: .35; cursor: not-allowed; }
.q-card .flag { font-size: 1.4rem; display: block; margin-bottom: 4px; }

/* ── BRACKET MATCH ── */
.bracket-section { margin-bottom: 24px; }
.bracket-round-title {
  font-weight: 800; font-size: 0.85rem; text-transform: uppercase;
  letter-spacing: .06em; color: var(--accent); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.bracket-round-badge {
  background: rgba(88,192,236,.12); color: var(--accent2);
  font-size: 0.65rem; padding: 2px 8px; border-radius: 99px; font-weight: 600;
  border: 1px solid rgba(88,192,236,.2);
}
.b-match {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 9px; padding: 12px; margin-bottom: 8px;
  transition: border-color .15s;
}
.b-match.complete { border-left: 3px solid var(--accent); }
.b-match.has-result { border-left: 3px solid var(--accent2); }
.b-match-num { font-size: 0.65rem; color: var(--text2); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.b-match-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
.b-team { font-weight: 700; font-size: 0.88rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.b-team.home { text-align: right; }
.b-team.away { text-align: left; }
.b-team.tbd { color: var(--text2); font-weight: 400; font-style: italic; font-size: 0.78rem; }
.score-block { display: flex; align-items: center; gap: 3px; }
.score-inp {
  width: 42px; height: 42px; text-align: center; font-size: 1.1rem; font-weight: 700;
  background: var(--surface3); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); outline: none; -moz-appearance: textfield; font-family: 'Poppins', sans-serif;
}
.score-inp::-webkit-outer-spin-button, .score-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
.score-inp:focus { border-color: var(--accent); }
.score-inp:disabled { opacity: .45; cursor: not-allowed; }
.score-sep { color: var(--text2); font-weight: bold; font-size: .9rem; }

/* winner buttons */
.winner-row { margin-top: 10px; }
.winner-label { font-size: 0.68rem; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
.winner-btns { display: flex; gap: 6px; }
.winner-btn {
  flex: 1; padding: 7px 6px; border-radius: 7px; border: 1px solid var(--border);
  background: var(--surface3); color: var(--text2); font-size: 0.78rem;
  font-weight: 600; cursor: pointer; transition: all .15s; font-family: 'Poppins', sans-serif;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.winner-btn:disabled { opacity: .45; cursor: not-allowed; }
.winner-btn.selected { background: linear-gradient(90deg,var(--grad-start),var(--grad-end)); border-color: var(--accent); color: white; }
.winner-btn.correct { background: linear-gradient(90deg,var(--grad-start),var(--grad-end)); border-color: var(--accent); color: white; }
.winner-btn.wrong { background: rgba(239,68,68,.15); border-color: var(--red); color: #fca5a5; }

/* team select (for R16 bracket builder) */
.team-select {
  width: 100%; background: var(--surface3); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 0.82rem;
  outline: none; font-family: 'Poppins', sans-serif; cursor: pointer;
}
.team-select:focus { border-color: var(--accent); }
.team-select option { background: var(--surface); }
.match-teams-grid { display: grid; grid-template-columns: 1fr 8px 1fr; gap: 6px; align-items: center; margin-bottom: 8px; }
.match-teams-grid .vs { text-align: center; color: var(--text2); font-size: 0.7rem; font-weight: 700; }

/* result row */
.result-row { display: flex; align-items: center; gap: 8px; margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--border); font-size: 0.8rem; }
.result-label { color: var(--text2); min-width: 72px; }
.result-score { font-weight: 700; color: var(--gold); }
.check { color: var(--accent); }
.cross { color: var(--red); }

/* pts badges */
.pts-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 99px; font-weight: 700; }
.pts-max { background: linear-gradient(90deg,var(--grad-start),var(--grad-end)); color: #fff; }
.pts-good { background: rgba(88,192,236,.2); color: var(--accent); border: 1px solid rgba(88,192,236,.4); }
.pts-some { background: rgba(245,158,11,.15); color: #fbbf24; border: 1px solid rgba(245,158,11,.3); }
.pts-zero { background: var(--surface3); color: var(--text2); }
.pts-pending { background: var(--surface3); color: var(--text2); font-style: italic; }

/* ── LEADERBOARD ── */
.lb-table { width: 100%; border-collapse: collapse; }
.lb-table th { text-align: left; padding: 8px 12px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); border-bottom: 1px solid var(--border); }
.lb-table td { padding: 11px 12px; border-bottom: 1px solid rgba(55,65,81,.4); }
.lb-table tr:last-child td { border-bottom: none; }
.lb-table tr:hover td { background: rgba(255,255,255,.02); }
.rank-cell { font-weight: 700; font-size: 0.85rem; width: 32px; }
.r1 { color: var(--gold); } .r2 { color: #cbd5e1; } .r3 { color: #a16207; }
.player-cell { font-weight: 600; }
.total-cell { font-weight: 800; font-size: 1.05rem; color: var(--accent); }
.mini-bar { background: var(--surface3); border-radius: 99px; height: 5px; overflow: hidden; }
.mini-bar-fill { height: 100%; background: linear-gradient(90deg,var(--grad-start),var(--grad-end)); border-radius: 99px; }

/* ── FORMS ── */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 0.78rem; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
.form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 0.9rem; outline: none; transition: border-color .15s; font-family: 'Poppins', sans-serif; }
.form-input:focus { border-color: var(--accent); }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 8px; border: none; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all .15s; font-family: 'Poppins', sans-serif; }
.btn-primary { background: linear-gradient(90deg,var(--grad-start),var(--grad-end)); color: white; }
.btn-primary:hover { opacity: .9; }
.btn-secondary { background: var(--surface3); color: var(--text); }
.btn-secondary:hover { background: rgba(88,192,236,.15); }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent2); }
.btn-danger { background: rgba(239,68,68,.2); color: #fca5a5; border: 1px solid rgba(239,68,68,.3); }
.btn-danger:hover { background: var(--red); color: white; }
.btn-full { width: 100%; justify-content: center; }
.btn-sm { padding: 6px 12px; font-size: 0.78rem; }

/* ── ALERTS ── */
.alert { padding: 10px 14px; border-radius: 8px; font-size: 0.83rem; margin-bottom: 12px; }
.alert-info { background: rgba(88,192,236,.1); color: var(--accent); border: 1px solid rgba(88,192,236,.3); }
.alert-success { background: rgba(0,82,160,.25); color: #93d8f5; border: 1px solid rgba(88,192,236,.4); }
.alert-warn { background: rgba(245,158,11,.1); color: #fbbf24; border: 1px solid rgba(245,158,11,.3); }

/* ── SAVE BAR ── */
#save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 50; gap: 8px; }
.save-progress { font-size: 0.78rem; color: var(--text2); }

/* ── ADMIN ── */
.tabs { display: flex; gap: 2px; background: var(--surface2); border-radius: 8px; padding: 3px; margin-bottom: 16px; }
.tab { flex: 1; padding: 8px; border: none; border-radius: 6px; background: none; color: var(--text2); font-size: 0.8rem; cursor: pointer; font-weight: 500; transition: all .15s; font-family: 'Poppins', sans-serif; }
.tab.active { background: var(--surface3); color: var(--text); }
.admin-match { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
.admin-inp { background: var(--surface3); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 0.85rem; outline: none; width: 100%; font-family: 'Poppins', sans-serif; }
.admin-inp:focus { border-color: var(--accent); }
.score-inp-sm { width: 46px; height: 36px; text-align: center; font-size: 1rem; font-weight: 700; background: var(--surface3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; -moz-appearance: textfield; font-family: 'Poppins', sans-serif; }
.score-inp-sm::-webkit-outer-spin-button, .score-inp-sm::-webkit-inner-spin-button { -webkit-appearance: none; }
.score-inp-sm:focus { border-color: var(--gold); }
.pool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px; }
.pool-inp-wrap { display: flex; align-items: center; gap: 4px; background: var(--surface3); border: 1px solid var(--border); border-radius: 6px; padding: 2px 6px; }
.pool-inp { background: none; border: none; color: var(--text); font-size: 0.82rem; outline: none; width: 100%; padding: 5px 2px; font-family: 'Poppins', sans-serif; }
.pool-num { font-size: 0.65rem; color: var(--text2); font-weight: 600; min-width: 16px; }
.qualifier-real-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 6px; }
.qualifier-real-btn { padding: 8px; background: var(--surface3); border: 1px solid var(--border); border-radius: 7px; color: var(--text2); cursor: pointer; font-size: 0.8rem; font-weight: 600; font-family: 'Poppins', sans-serif; transition: all .15s; text-align: center; }
.qualifier-real-btn.selected { background: linear-gradient(90deg,var(--grad-start),var(--grad-end)); border-color: var(--accent); color: white; }

/* ── MODAL ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; max-width: 440px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }

/* ── MISC ── */
.hidden { display: none !important; }
.text-2 { color: var(--text2); }
.text-sm { font-size: 0.82rem; }
.text-center { text-align: center; }
.mt-3 { margin-top: 12px; }
.code-block { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 0.75rem; word-break: break-all; color: var(--accent); max-height: 120px; overflow-y: auto; }
.empty-state { text-align: center; padding: 40px 16px; color: var(--text2); }
.empty-icon { font-size: 2.5rem; margin-bottom: 8px; }
.section-sep { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.adv-bonus-info { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 8px; margin: 12px 0; }
.bonus-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
.bonus-chip .pts { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
.bonus-chip .label { font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
/* ── TABLET ── */
@media (max-width: 768px) {
  main { padding: 12px 12px 100px; }
  .qualifier-grid { grid-template-columns: repeat(auto-fill, minmax(110px,1fr)); gap: 6px; }
  .adv-bonus-info { grid-template-columns: repeat(3, 1fr); }
}

/* ── MOBILE ── */
@media (max-width: 520px) {
  /* header */
  header { padding: 8px 12px; gap: 8px; }
  header img { height: 24px !important; }
  nav { gap: 1px; }
  .nav-btn { padding: 6px 7px; font-size: 0.7rem; }

  /* status bar */
  #status-bar { padding: 5px 12px; font-size: 0.72rem; }

  /* main */
  main { padding: 10px 10px 100px; }
  .card { padding: 13px 12px; }

  /* step bar */
  .step-bar { border-radius: 8px; }
  .step-btn { font-size: 0.58rem; padding: 9px 2px; letter-spacing: 0; }
  .step-num { font-size: 0.9rem; }

  /* qualifier picker */
  .qualifier-grid { grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .q-card { padding: 9px 6px; font-size: 0.77rem; }
  .qualifier-counter { font-size: 0.82rem; }

  /* bracket matches */
  .b-team { font-size: 0.76rem; }
  .b-match { padding: 10px; }
  .score-inp { width: 38px; height: 38px; font-size: 0.95rem; }
  .winner-btn { font-size: 0.72rem; padding: 7px 4px; }

  /* match-teams-grid used in admin */
  .match-teams-grid { grid-template-columns: 1fr 8px 1fr; }

  /* admin tabs */
  .tabs { overflow-x: auto; flex-wrap: nowrap; padding: 3px; gap: 2px; }
  .tab { font-size: 0.68rem; padding: 7px 6px; white-space: nowrap; flex-shrink: 0; }

  /* admin pool grid */
  .pool-grid { grid-template-columns: 1fr 1fr; }
  .qualifier-real-grid { grid-template-columns: 1fr 1fr; gap: 5px; }
  .qualifier-real-btn { padding: 7px 5px; font-size: 0.72rem; }

  /* leaderboard */
  .lb-table th, .lb-table td { padding: 9px 8px; }
  .lb-table th:nth-child(4), .lb-table td:nth-child(4) { display: none; } /* hide bar column */
  .total-cell { font-size: 0.95rem; }

  /* welcome card */
  .welcome-card { padding: 28px 18px; }
  .welcome-title { font-size: 1.7rem; }

  /* bonus chips */
  .adv-bonus-info { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .bonus-chip { padding: 8px 4px; }
  .bonus-chip .pts { font-size: 1.1rem; }
  .bonus-chip .label { font-size: 0.62rem; }

  /* save bar */
  #save-bar { padding: 8px 12px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
  .save-progress { font-size: 0.72rem; }
  .btn { font-size: 0.82rem; padding: 9px 14px; }
  .btn-sm { padding: 6px 10px; font-size: 0.74rem; }

  /* modal */
  .modal { padding: 18px 16px; }
  .modal-title { font-size: 1rem; }

  /* alerts */
  .alert { font-size: 0.78rem; padding: 9px 12px; }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     WELCOME
══════════════════════════════════════════════════ -->
<div id="screen-welcome">
  <div class="welcome-card">
    <img src="logo-secundaria.png" alt="Comercial Antartica" style="width:170px;margin-bottom:16px;display:block;margin-left:auto;margin-right:auto;mix-blend-mode:screen">
    <h1 class="welcome-title">Prode <span>Mundial</span></h1>
    <p style="background:linear-gradient(90deg,var(--grad-start),var(--grad-end));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;font-size:1rem;margin-bottom:4px">USA · Canadá · México 2026</p>
    <p class="welcome-sub">Fase Eliminatoria · Octavos a Final</p>

    <div class="form-group">
      <label class="form-label">Tu nombre para el prode</label>
      <input id="player-name-inp" class="form-input" type="text" placeholder="Ingresá tu nombre" maxlength="30" autocomplete="off">
    </div>

<script>
// ════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════

// Rounds for bracket prediction (NO R32)
const ROUNDS = [
  { id: 'R16', name: 'Octavos de Final',  count: 8 },
  { id: 'QF',  name: 'Cuartos de Final',  count: 4 },
  { id: 'SF',  name: 'Semifinales',       count: 2 },
  { id: 'TP',  name: '3er Puesto',        count: 1 },
  { id: 'F',   name: 'Final',             count: 1 },
];

// Advancement bonus per round (per winning team)
const ADV_BONUS = { R16: 2, QF: 3, SF: 4, F: 10, TP: 0 };

// Bracket progression: for each match in next round, which two matches feed it
// QF[i] = [R16 match a, R16 match b] → winner(a) vs winner(b)
const FEEDS = {
  QF: [[0,1],[2,3],[4,5],[6,7]],
  SF: [[0,1],[2,3]],
  F:  [[0],[1]],  // winner SF[0] vs winner SF[1]
  TP: [[0],[1]],  // loser SF[0] vs loser SF[1]
};

const QUALIFIER_COUNT = 16;

// 48 equipos · 12 grupos de 4 · formato oficial Mundial 2026
// ⚠️ Admin: verificar grupos contra el sorteo oficial (5 dic 2024)
// Cada equipo: { name: string, code: ISO-3166-1-alpha-2 (lowercase) }
function defaultGroups() {
  return [
    { name: 'A', teams: [
      { name: 'México',              code: 'mx' }, { name: 'Sudáfrica',           code: 'za' },
      { name: 'Corea del Sur',       code: 'kr' }, { name: 'Chequia',             code: 'cz' },
    ]},
    { name: 'B', teams: [
      { name: 'Canadá',              code: 'ca' }, { name: 'Bosnia y Herzegovina',code: 'ba' },
      { name: 'Qatar',               code: 'qa' }, { name: 'Suiza',               code: 'ch' },
    ]},
    { name: 'C', teams: [
      { name: 'Brasil',              code: 'br' }, { name: 'Marruecos',           code: 'ma' },
      { name: 'Haití',               code: 'ht' }, { name: 'Escocia',             code: 'gb-sct' },
    ]},
    { name: 'D', teams: [
      { name: 'Estados Unidos',      code: 'us' }, { name: 'Paraguay',            code: 'py' },
      { name: 'Australia',           code: 'au' }, { name: 'Turquía',             code: 'tr' },
    ]},
    { name: 'E', teams: [
      { name: 'Alemania',            code: 'de' }, { name: 'Curazao',             code: 'cw' },
      { name: 'Costa de Marfil',     code: 'ci' }, { name: 'Ecuador',             code: 'ec' },
    ]},
    { name: 'F', teams: [
      { name: 'Países Bajos',        code: 'nl' }, { name: 'Japón',               code: 'jp' },
      { name: 'Suecia',              code: 'se' }, { name: 'Túnez',               code: 'tn' },
    ]},
    { name: 'G', teams: [
      { name: 'Bélgica',             code: 'be' }, { name: 'Egipto',              code: 'eg' },
      { name: 'Irán',                code: 'ir' }, { name: 'Nueva Zelanda',       code: 'nz' },
    ]},
    { name: 'H', teams: [
      { name: 'España',              code: 'es' }, { name: 'Cabo Verde',          code: 'cv' },
      { name: 'Arabia Saudita',      code: 'sa' }, { name: 'Uruguay',             code: 'uy' },
    ]},
    { name: 'I', teams: [
      { name: 'Francia',             code: 'fr' }, { name: 'Senegal',             code: 'sn' },
      { name: 'Irak',                code: 'iq' }, { name: 'Noruega',             code: 'no' },
    ]},
    { name: 'J', teams: [
      { name: 'Argentina',           code: 'ar' }, { name: 'Argelia',             code: 'dz' },
      { name: 'Austria',             code: 'at' }, { name: 'Jordania',            code: 'jo' },
    ]},
    { name: 'K', teams: [
      { name: 'Portugal',            code: 'pt' }, { name: 'RD Congo',            code: 'cd' },
      { name: 'Uzbekistán',          code: 'uz' }, { name: 'Colombia',            code: 'co' },
    ]},
    { name: 'L', teams: [
      { name: 'Inglaterra',          code: 'gb-eng' }, { name: 'Croacia',         code: 'hr' },
      { name: 'Ghana',               code: 'gh' }, { name: 'Panamá',             code: 'pa' },
    ]},
  ];
}

// Max equipos de un mismo grupo que pueden clasificar a Octavos:
// 2 directos (1° y 2°) + hasta 1 mejor 3° = 3 máximo
const MAX_PER_GROUP = 3;

// Normalize: old data stored teams as strings, new format is { name, code }
function normTeam(t) { return typeof t === 'string' ? { name: t.replace(/^[^\wÀ-ɏ]+/u,'').trim(), code: '' } : t; }
function allGroupTeams() {
  return (data.groups || defaultGroups()).flatMap(g => g.teams.map(t => normTeam(t).name));
}
function teamGroup(teamName) {
  return (data.groups || defaultGroups()).find(g => g.teams.some(t => normTeam(t).name === teamName));
}
function groupPickCount(groupName, selected) {
  const g = (data.groups || defaultGroups()).find(x => x.name === groupName);
  return g ? g.teams.filter(t => selected.includes(normTeam(t).name)).length : 0;
}
function teamFlagCode(teamName) {
  for (const g of (data.groups || defaultGroups())) {
    const t = g.teams.find(t => normTeam(t).name === teamName);
    if (t) return normTeam(t).code || '';
  }
  return '';
}
function flagImg(code, h = 16) {
  if (!code) return '';
  return `<img src="https://flagcdn.com/w40/${code}.png" loading="lazy" style="height:${h}px;border-radius:2px;vertical-align:middle;margin-right:5px;flex-shrink:0">`;
}

const STEPS = [
  { id: 'qualifiers', label: '16 Clasificados' },
  { id: 'R16',        label: 'Octavos' },
  { id: 'QF',         label: 'Cuartos' },
  { id: 'SF',         label: 'Semis' },
  { id: 'final',      label: 'Final' },
];

// ════════════════════════════════════════════════════
// DATA MODEL
// ════════════════════════════════════════════════════

function defaultData() {
  const teams = {};
  for (const r of ROUNDS)
    for (let i = 0; i < r.count; i++)
      teams[`${r.id}_${i}`] = { home: '', away: '' };
  return {
    adminPassword: 'admin2026',
    groups: defaultGroups(),
    realQualifiers: [],           // actual 16 R16 teams (admin-set)
    teams,                        // actual match teams (admin-set)
    results: {},                  // actual match results: { R16_0: {home,away,winner} }
    players: [],
    predictions: {},
  };
}

const STORAGE_KEY = 'prode_mundial_2026_v2';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = defaultData();
      const saved = JSON.parse(raw);
      const merged = Object.assign(d, saved);
      // migrate: if old format had pool[], replace with default groups
      if (!merged.groups || !Array.isArray(merged.groups) || merged.groups.length === 0) {
        merged.groups = defaultGroups();
      }
      return merged;
    }
  } catch(e) {}
  return defaultData();
}
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

let data = loadData();
let currentPlayer = null;
let isAdmin = false;
let currentPage = 'predictions';
let currentStep = 0;
let draft = {};  // working copy of player's predictions

// ════════════════════════════════════════════════════
// PREDICTION HELPERS
// ════════════════════════════════════════════════════

// Get winner team name from a match in player's draft
function draftWinner(roundId, matchIdx) {
  const m = (draft[roundId] || [])[matchIdx];
  if (!m || !m.winner) return null;
  return m.winner === 'home' ? m.home : m.away;
}

// Get loser team name from a match in player's draft
function draftLoser(roundId, matchIdx) {
  const m = (draft[roundId] || [])[matchIdx];
  if (!m || !m.winner) return null;
  return m.winner === 'home' ? m.away : m.home;
}

// Auto-derive QF/SF/F/TP teams from player's draft bracket
function derivedTeam(roundId, matchIdx, side) {
  if (roundId === 'R16') {
    return (draft.qualifiers || [])[matchIdx * 2 + (side === 'home' ? 0 : 1)] || '';
  }
  if (roundId === 'QF') {
    const feeds = FEEDS.QF[matchIdx];
    return draftWinner('R16', feeds[side === 'home' ? 0 : 1]) || '';
  }
  if (roundId === 'SF') {
    const feeds = FEEDS.SF[matchIdx];
    return draftWinner('QF', feeds[side === 'home' ? 0 : 1]) || '';
  }
  if (roundId === 'F') {
    return draftWinner('SF', side === 'home' ? 0 : 1) || '';
  }
  if (roundId === 'TP') {
    return draftLoser('SF', side === 'home' ? 0 : 1) || '';
  }
  return '';
}

// Initialize or sync a round's matches with derived teams
function syncDraftRound(roundId) {
  const r = ROUNDS.find(x => x.id === roundId);
  if (!r) return;
  if (!draft[roundId]) draft[roundId] = Array(r.count).fill(null).map(() => ({}));
  for (let i = 0; i < r.count; i++) {
    const m = draft[roundId][i] || {};
    if (roundId !== 'R16') {
      m.home = derivedTeam(roundId, i, 'home');
      m.away = derivedTeam(roundId, i, 'away');
      // clear winner if teams changed
      if (!m.home || !m.away) { m.winner = null; m.homeScore = ''; m.awayScore = ''; }
    }
    draft[roundId][i] = m;
  }
}

// ════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════

function loginPlayer() {
  const name = document.getElementById('player-name-inp').value.trim();
  if (!name) { showWelcomeError('Ingresá tu nombre para continuar.'); return; }
  let player = data.players.find(p => p.name.toLowerCase() === name.toLowerCase());
  if (!player) { player = { id: crypto.randomUUID(), name }; data.players.push(player); saveData(); }
  currentPlayer = player;
  isAdmin = false;
  draft = JSON.parse(JSON.stringify(data.predictions[player.id] || {}));
  if (!draft.qualifiers) draft.qualifiers = [];
  enterApp();
}

function loginAdmin() {
  const pass = document.getElementById('admin-pass-inp').value;
  if (pass !== data.adminPassword) { showWelcomeError('Contraseña incorrecta.'); return; }
  currentPlayer = { id: '__admin__', name: 'Administrador' };
  isAdmin = true; draft = {};
  enterApp();
}

function logout() {
  currentPlayer = null; isAdmin = false; draft = {};
  document.getElementById('screen-app').classList.add('hidden');
  document.getElementById('screen-welcome').classList.remove('hidden');

  document.getElementById('admin-pass-inp').value = '';

function enterApp() {
  document.getElementById('screen-welcome').classList.add('hidden');
  document.getElementById('screen-app').classList.remove('hidden');

// ════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════

function showPage(page) {
  currentPage = page;
  ['predictions','leaderboard','admin'].forEach(p => {
    document.getElementById(`page-${p}`).classList.toggle('hidden', p !== page);
    const btn = document.getElementById(`nav-${p}`);
    if (btn) btn.classList.toggle('active', p === page);
  });
  document.getElementById('save-bar').classList.toggle('hidden', page !== 'predictions' || isAdmin);
  if (page === 'predictions') renderPredictions();
  else if (page === 'leaderboard') renderLeaderboard();
  else if (page === 'admin') renderAdmin();
}

function goStep(s) { currentStep = s; renderPredictions(); }

// ════════════════════════════════════════════════════
// SCORING
// ════════════════════════════════════════════════════

// Find real result for a match between teamA and teamB in a given round
function findRealResult(roundId, teamA, teamB) {
  if (!teamA || !teamB) return null;
  const r = ROUNDS.find(x => x.id === roundId);
  if (!r) return null;
  for (let i = 0; i < r.count; i++) {
    const key = `${roundId}_${i}`;
    const t = data.teams[key] || {};
    const res = data.results[key];
    if (!res) continue;
    if ((t.home === teamA && t.away === teamB) || (t.home === teamB && t.away === teamA)) {
      return { ...res, homeTeam: t.home, awayTeam: t.away };
    }
  }
  return null;
}

// Per-match points for a player's predicted match
function matchPoints(playerId, roundId, matchIdx) {
  const saved = (data.predictions[playerId] || {})[roundId] || [];
  const pm = saved[matchIdx];
  if (!pm || !pm.home || !pm.away) return null;
  const real = findRealResult(roundId, pm.home, pm.away);
  if (!real) return null;

  const realWinner = real.winner === 'home' ? real.homeTeam : real.awayTeam;
  const playerWinner = pm.winner === 'home' ? pm.home : pm.away;
  let pts = 0;
  if (playerWinner === realWinner) pts += 2;
  // exact score (normalize to player's home/away perspective)
  const pHome = pm.homeScore, pAway = pm.awayScore;
  const isHomeMatch = real.homeTeam === pm.home;
  const rHome = isHomeMatch ? real.home : real.away;
  const rAway = isHomeMatch ? real.away : real.home;
  if (pHome === rHome && pAway === rAway) pts += 1;
  return pts;
}

// Advancement bonus: did this team actually advance in this round?
function advBonus(roundId, teamName) {
  if (!teamName) return false;
  const r = ROUNDS.find(x => x.id === roundId);
  if (!r) return false;
  for (let i = 0; i < r.count; i++) {
    const key = `${roundId}_${i}`;
    const res = data.results[key];
    const t = data.teams[key];
    if (!res || !t) continue;
    const winner = res.winner === 'home' ? t.home : t.away;
    if (winner === teamName) return true;
  }
  return false;
}

function playerStats(playerId) {
  const preds = data.predictions[playerId] || {};
  let pts = 0, exact = 0, winners = 0, qualBonus = 0, advBonusPts = 0;
  let matchesPlayed = 0;

  // Qualifier bonus
  const realQ = data.realQualifiers || [];
  const playerQ = preds.qualifiers || [];
  const qBonus = playerQ.filter(t => realQ.includes(t)).length;
  qualBonus = qBonus; pts += qBonus;

  // Per-round
  for (const r of ROUNDS) {
    if (r.id === 'TP') continue; // 3rd place has no adv bonus
    const playerRound = preds[r.id] || [];
    for (let i = 0; i < r.count; i++) {
      const pm = playerRound[i];
      if (!pm || !pm.home || !pm.away) continue;
      const real = findRealResult(r.id, pm.home, pm.away);
      if (!real) continue;
      matchesPlayed++;
      const realWinner = real.winner === 'home' ? real.homeTeam : real.awayTeam;
      const playerWinner = pm.winner === 'home' ? pm.home : pm.away;
      if (playerWinner === realWinner) { winners++; pts += 2; }
      const isHM = real.homeTeam === pm.home;
      const rH = isHM ? real.home : real.away;
      const rA = isHM ? real.away : real.home;
      if (pm.homeScore === rH && pm.awayScore === rA) { exact++; pts += 1; }
      // Advancement bonus
      const bonus = ADV_BONUS[r.id] || 0;
      if (bonus > 0 && advBonus(r.id, playerWinner)) { advBonusPts += bonus; pts += bonus; }
    }
    // TP per-match (no adv bonus)
    if (r.id !== 'TP') continue;
  }
  // TP separately
  const tpPreds = preds['TP'] || [];
  const tpm = tpPreds[0];
  if (tpm && tpm.home && tpm.away) {
    const real = findRealResult('TP', tpm.home, tpm.away);
    if (real) {
      matchesPlayed++;
      const realWinner = real.winner === 'home' ? real.homeTeam : real.awayTeam;
      const playerWinner = tpm.winner === 'home' ? tpm.home : tpm.away;
      if (playerWinner === realWinner) { winners++; pts += 2; }
      const isHM = real.homeTeam === tpm.home;
      if (tpm.homeScore === (isHM?real.home:real.away) && tpm.awayScore === (isHM?real.away:real.home)) { exact++; pts += 1; }
    }
  }

  return { pts, exact, winners, qualBonus, advBonusPts, matchesPlayed };
}

// ════════════════════════════════════════════════════
// PREDICTIONS RENDER
// ════════════════════════════════════════════════════

function renderPredictions() {
  const container = document.getElementById('predictions-content');
  // Sync derived rounds before rendering
  ['QF','SF','F','TP'].forEach(r => syncDraftRound(r));
  updateStatusPts();

  let html = '';

  // Step bar
  html += `<div class="step-bar">`;
  STEPS.forEach((s, i) => {
    const done = isStepDone(i);
    const cls = i === currentStep ? 'step-btn active' : done ? 'step-btn done' : 'step-btn';
    html += `<button class="${cls}" onclick="goStep(${i})">
      <span class="step-num">${i+1}</span>${s.label}
    </button>`;
  });
  html += `</div>`;

  // Step content
  if (currentStep === 0) html += renderStepQualifiers();
  else if (currentStep === 1) html += renderStepRound('R16', true);
  else if (currentStep === 2) html += renderStepRound('QF');
  else if (currentStep === 3) html += renderStepRound('SF');
  else if (currentStep === 4) html += renderStepFinal();

  // Nav buttons
  html += `<div style="display:flex;gap:8px;margin-top:16px;justify-content:space-between">
    <button class="btn btn-secondary" onclick="goStep(Math.max(0,${currentStep}-1))" ${currentStep===0?'disabled':''}>← Anterior</button>
    ${currentStep < STEPS.length-1 ? `<button class="btn btn-primary" onclick="savePredictions();goStep(${currentStep+1})">Guardar y Continuar →</button>` : `<button class="btn btn-primary" onclick="savePredictions()">💾 Guardar todo</button>`}
  </div>`;

  container.innerHTML = html;
  updateSaveProgress();
}

function isStepDone(stepIdx) {
  const s = STEPS[stepIdx];
  if (s.id === 'qualifiers') return (draft.qualifiers || []).length === QUALIFIER_COUNT;
  if (s.id === 'final') {
    const sf = (draft['SF'] || []);
    const f  = (draft['F']  || []);
    const tp = (draft['TP'] || []);
    return sf.length >= 2 && sf[0]?.winner && sf[1]?.winner &&
           f[0]?.winner && tp[0]?.winner;
  }
  const r = ROUNDS.find(x => x.id === s.id);
  if (!r) return false;
  const rd = draft[s.id] || [];
  return rd.filter(m => m?.winner).length === r.count;
}

// ── STEP 1: QUALIFIER PICKS ──
function renderStepQualifiers() {
  const selected = draft.qualifiers || [];
  const groups = data.groups || defaultGroups();
  const realQ = data.realQualifiers || [];
  const resultsIn = realQ.length > 0;

  let html = `<div class="card">
    <div style="margin-bottom:12px">
      <div style="font-size:1rem;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Paso 1 — Elegí tus 16 clasificados a Octavos</div>
      <div class="text-2 text-sm">Seleccioná 16 equipos que crees que llegan a Octavos. Máximo 3 por grupo.</div>
    </div>`;

  if (!resultsIn) {
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <div class="qualifier-counter"><b>${selected.length}</b> / 16 seleccionados</div>
    </div>`;
  } else {
    const correct = selected.filter(t => realQ.includes(t)).length;
    html += `<div class="alert alert-success" style="margin-bottom:12px">Clasificados reales cargados · Tus puntos: <b>+${correct} pts</b></div>`;
  }

  groups.forEach(group => {
    const pickedInGroup = groupPickCount(group.name, selected);
    const groupFull = pickedInGroup >= MAX_PER_GROUP;

    html += `<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="background:linear-gradient(135deg,var(--grad-start),var(--grad-end));color:#fff;font-weight:800;font-size:.7rem;padding:2px 9px;border-radius:20px;letter-spacing:.06em">GRUPO ${escHtml(group.name)}</span>
        <span style="font-size:.72rem;color:var(--text2)">${pickedInGroup > 0 ? `${pickedInGroup}/3 elegidos` : ''}</span>
      </div>
      <div class="qualifier-grid">`;

    group.teams.forEach(rawTeam => {
      const t = normTeam(rawTeam);
      const isSel = selected.includes(t.name);
      const isDisabledByGroup = !isSel && groupFull;
      const isDisabled = resultsIn || isDisabledByGroup;
      let cls = 'q-card';
      if (resultsIn) {
        if (isSel && realQ.includes(t.name)) cls += ' result-correct selected';
        else if (isSel && !realQ.includes(t.name)) cls += ' result-wrong selected';
        else if (!isSel && realQ.includes(t.name)) cls += ' result-correct';
        else if (isDisabledByGroup) cls += ' q-card-disabled';
      } else if (isSel) {
        cls += ' selected';
      } else if (isDisabledByGroup) {
        cls += ' q-card-disabled';
      }
      const style = isDisabled ? 'opacity:.45;pointer-events:none' : '';
      html += `<div class="${cls}" style="${style};display:flex;align-items:center;justify-content:center" onclick="toggleQualifier('${escJs(t.name)}')">${flagImg(t.code)}${escHtml(t.name)}</div>`;
    });

    html += `</div></div>`;
  });

  html += `</div>`;

  html += `<div class="card">
    <div class="card-title">Sistema de puntos · Bonus por clasificación</div>
    <div class="adv-bonus-info">
      <div class="bonus-chip"><div class="pts">+1</div><div class="label">Por cada 8vofinalista</div></div>
      <div class="bonus-chip"><div class="pts">+2</div><div class="label">Por cada cuartofinalista</div></div>
      <div class="bonus-chip"><div class="pts">+3</div><div class="label">Por cada semifinalista</div></div>
      <div class="bonus-chip"><div class="pts">+4</div><div class="label">Por cada finalista</div></div>
      <div class="bonus-chip"><div class="pts">+10</div><div class="label">Por el campeón</div></div>
    </div>
    <div class="text-sm text-2">Todos son adicionales a los puntos por partidos (2 pts ganador + 1 exacto).</div>
  </div>`;

  return html;
}

function toggleQualifier(team) {
  if (!draft.qualifiers) draft.qualifiers = [];
  const idx = draft.qualifiers.indexOf(team);
  if (idx >= 0) {
    draft.qualifiers.splice(idx, 1);
  } else {
    if (draft.qualifiers.length >= QUALIFIER_COUNT) {
      showToast('Ya elegiste 16 equipos. Deseleccioná uno antes.');
      return;
    }
    const g = teamGroup(team);
    if (g && groupPickCount(g.name, draft.qualifiers) >= MAX_PER_GROUP) {
      showToast(`Máximo ${MAX_PER_GROUP} equipos del Grupo ${g.name}.`);
      return;
    }
    draft.qualifiers.push(team);
  }
  renderPredictions();
}

// ── STEP 2: R16 BRACKET BUILDER ──
function renderStepRound(roundId, isR16 = false) {
  const r = ROUNDS.find(x => x.id === roundId);
  const saved = (data.predictions[currentPlayer?.id] || {})[roundId] || [];
  const rd = draft[roundId] || Array(r.count).fill(null).map(() => ({}));

  let html = `<div class="card">
    <div style="font-size:1rem;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">${r.name}</div>
    <div class="text-sm text-2">Predecí el marcador y elegí quién avanza en cada partido.</div>
    ${isR16 && (draft.qualifiers||[]).length < QUALIFIER_COUNT ? `<div class="alert alert-warn" style="margin-top:10px">Primero elegí tus 16 clasificados en el Paso 1.</div>` : ''}
  </div>`;

  for (let i = 0; i < r.count; i++) {
    const m = rd[i] || {};
    const savedM = saved[i] || {};
    const realRes = (() => {
      if (!m.home || !m.away) return null;
      return findRealResult(roundId, m.home, m.away);
    })();

    const hasSaved = !!savedM.winner;
    const hasResult = !!realRes;
    const cardCls = hasResult ? 'b-match has-result' : (hasSaved ? 'b-match complete' : 'b-match');

    let ptsBadge = '';
    if (hasResult) {
      const pts = matchPoints(currentPlayer?.id, roundId, i) || 0;
      const bonus = (() => {
        const pWinner = savedM.winner === 'home' ? savedM.home : savedM.away;
        return advBonus(roundId, pWinner) ? (ADV_BONUS[roundId]||0) : 0;
      })();
      const total = pts + bonus;
      const maxPts = 3 + (ADV_BONUS[roundId]||0);
      const cls = total === maxPts ? 'pts-max' : total >= 3 ? 'pts-good' : total >= 1 ? 'pts-some' : 'pts-zero';
      const bonStr = bonus > 0 ? ` +${bonus}★` : '';
      ptsBadge = `<span class="pts-badge ${cls}">${total} pts${bonStr}</span>`;
    } else if (hasSaved) {
      ptsBadge = `<span class="pts-badge pts-pending">guardado</span>`;
    }

    const disabled = hasResult ? 'disabled' : '';
    const homeTeam = isR16 ? (m.home || `Equipo ${i*2+1}`) : (m.home || '?');
    const awayTeam = isR16 ? (m.away || `Equipo ${i*2+2}`) : (m.away || '?');

    html += `<div class="${cardCls}" id="bm-${roundId}-${i}">
      <div class="b-match-num">Partido ${i+1} ${ptsBadge ? '· ' : ''}${ptsBadge}</div>`;

    // R16: team selectors from qualifier picks
    if (isR16) {
      const picks = draft.qualifiers || [];
      const usedHome = rd.map((x,j) => j!==i ? x?.home : null).filter(Boolean);
      const usedAway = rd.map((x,j) => j!==i ? x?.away : null).filter(Boolean);
      const freeForHome = picks.filter(t => !usedHome.includes(t) && t !== m.away);
      const freeForAway = picks.filter(t => !usedAway.includes(t) && t !== m.home);

      if (hasResult) {
        html += `<div class="b-match-row">
          <span class="b-team home ${!m.home?'tbd':''}">${escHtml(homeTeam)}</span>
          <div class="score-block">
            <input class="score-inp" type="number" value="${m.homeScore??''}" disabled>
            <span class="score-sep">:</span>
            <input class="score-inp" type="number" value="${m.awayScore??''}" disabled>
          </div>
          <span class="b-team away ${!m.away?'tbd':''}">${escHtml(awayTeam)}</span>
        </div>`;
      } else {
        html += `<div class="match-teams-grid">
          <select class="team-select" onchange="setR16Team(${i},'home',this.value)" ${disabled}>
            <option value="">— Local —</option>
            ${picks.map(t=>`<option value="${escHtml(t)}" ${m.home===t?'selected':''}>${escHtml(t)}</option>`).join('')}
          </select>
          <div class="vs">vs</div>
          <select class="team-select" onchange="setR16Team(${i},'away',this.value)" ${disabled}>
            <option value="">— Visitante —</option>
            ${picks.map(t=>`<option value="${escHtml(t)}" ${m.away===t?'selected':''}>${escHtml(t)}</option>`).join('')}
          </select>
        </div>
        <div class="b-match-row">
          <span class="b-team home ${!m.home?'tbd':''}">${escHtml(homeTeam)}</span>
          <div class="score-block">
            <input class="score-inp" type="number" min="0" max="20" value="${m.homeScore??''}" placeholder="—"
              oninput="setMatchScore('${roundId}',${i},'home',this.value)">
            <span class="score-sep">:</span>
            <input class="score-inp" type="number" min="0" max="20" value="${m.awayScore??''}" placeholder="—"
              oninput="setMatchScore('${roundId}',${i},'away',this.value)">
          </div>
          <span class="b-team away ${!m.away?'tbd':''}">${escHtml(awayTeam)}</span>
        </div>`;
      }
    } else {
      // QF/SF: teams derived automatically
      html += `<div class="b-match-row">
        <span class="b-team home ${!m.home?'tbd':''}">${escHtml(homeTeam)}</span>
        <div class="score-block">
          <input class="score-inp" type="number" min="0" max="20" value="${m.homeScore??''}" placeholder="—"
            oninput="setMatchScore('${roundId}',${i},'home',this.value)" ${!m.home||!m.away||hasResult?'disabled':''}>
          <span class="score-sep">:</span>
          <input class="score-inp" type="number" min="0" max="20" value="${m.awayScore??''}" placeholder="—"
            oninput="setMatchScore('${roundId}',${i},'away',this.value)" ${!m.home||!m.away||hasResult?'disabled':''}>
        </div>
        <span class="b-team away ${!m.away?'tbd':''}">${escHtml(awayTeam)}</span>
      </div>`;
    }

    // Winner buttons
    const hSel = m.winner === 'home' ? 'selected' : '';
    const aSel = m.winner === 'away' ? 'selected' : '';
    if (hasResult) {
      const realW = realRes.winner === 'home' ? realRes.homeTeam : realRes.awayTeam;
      const hCls = realW === homeTeam ? 'winner-btn correct' : (m.winner==='home'?'winner-btn wrong':'winner-btn');
      const aCls = realW === awayTeam ? 'winner-btn correct' : (m.winner==='away'?'winner-btn wrong':'winner-btn');
      html += `<div class="winner-row">
        <div class="winner-label">¿Quién avanza?</div>
        <div class="winner-btns">
          <button class="${hCls}" disabled>${escHtml(homeTeam)}</button>
          <button class="${aCls}" disabled>${escHtml(awayTeam)}</button>
        </div>
      </div>`;
      // result row
      const isHM = realRes.homeTeam === homeTeam;
      const rH = isHM ? realRes.home : realRes.away;
      const rA = isHM ? realRes.away : realRes.home;
      const corrScore = (m.homeScore===rH && m.awayScore===rA);
      html += `<div class="result-row">
        <span class="result-label">Resultado:</span>
        <span class="result-score">${rH} - ${rA}</span>
        ${corrScore ? '<span class="check">✔ exacto</span>' : `<span class="cross">✘ (pred: ${m.homeScore??'?'}-${m.awayScore??'?'})</span>`}
      </div>`;
    } else if (m.home && m.away) {
      html += `<div class="winner-row">
        <div class="winner-label">¿Quién avanza? <span style="color:var(--red)">*</span></div>
        <div class="winner-btns">
          <button class="winner-btn ${hSel}" onclick="setWinner('${roundId}',${i},'home')">${escHtml(homeTeam)}</button>
          <button class="winner-btn ${aSel}" onclick="setWinner('${roundId}',${i},'away')">${escHtml(awayTeam)}</button>
        </div>
      </div>`;
    }

    html += `</div>`;
  }
  return html;
}

  return html;

// DRAFT MUTATIONS
// ════════════════════════════════════════════════════

function setR16Team(matchIdx, side, value) {
  if (!draft['R16']) draft['R16'] = Array(8).fill(null).map(()=>({}));
  if (!draft['R16'][matchIdx]) draft['R16'][matchIdx] = {};
  draft['R16'][matchIdx][side] = value;
  // clear winner if teams changed
  draft['R16'][matchIdx].winner = null;
  renderPredictions();
}

function setMatchScore(roundId, matchIdx, side, value) {
  if (!draft[roundId]) draft[roundId] = Array(ROUNDS.find(r=>r.id===roundId).count).fill(null).map(()=>({}));
  if (!draft[roundId][matchIdx]) draft[roundId][matchIdx] = {};
  const n = value === '' ? '' : Math.max(0, parseInt(value)||0);
  draft[roundId][matchIdx][side === 'home' ? 'homeScore' : 'awayScore'] = n;
  updateSaveProgress();
}

function setWinner(roundId, matchIdx, side) {
  if (!draft[roundId]) draft[roundId] = Array(ROUNDS.find(r=>r.id===roundId).count).fill(null).map(()=>({}));
  if (!draft[roundId][matchIdx]) draft[roundId][matchIdx] = {};
  draft[roundId][matchIdx].winner = side;
  // Re-derive downstream rounds
  const order = ['R16','QF','SF','F','TP'];
  const idx = order.indexOf(roundId);
  for (let i = idx+1; i < order.length; i++) syncDraftRound(order[i]);
  renderPredictions();
}

function savePredictions() {
  if (!currentPlayer || isAdmin) return;
  if (!data.predictions[currentPlayer.id]) data.predictions[currentPlayer.id] = {};
  const saved = data.predictions[currentPlayer.id];
  // Save qualifiers
  saved.qualifiers = [...(draft.qualifiers || [])];
  // Save each round
  for (const r of ROUNDS) {
    if (draft[r.id]) saved[r.id] = JSON.parse(JSON.stringify(draft[r.id]));
  }
  saveData();
  showToast('💾 Predicciones guardadas');
  renderPredictions();
}

function updateSaveProgress() {
  const el = document.getElementById('save-progress-text');
  if (!el) return;
  const q = (draft.qualifiers||[]).length;
  let matches = 0, total = 0;
  for (const r of ROUNDS) { total += r.count; matches += (draft[r.id]||[]).filter(m=>m?.winner).length; }
  el.textContent = `Clasificados: ${q}/16 · Partidos: ${matches}/${total}`;
}

function updateStatusPts() {
  const el = document.getElementById('status-pts-text');
  if (!el || !currentPlayer || isAdmin) return;
  const stats = playerStats(currentPlayer.id);
  const played = Object.keys(data.results).length + (data.realQualifiers||[]).length;
  el.textContent = played > 0 ? `${stats.pts} pts` : '';
}

    html += `<div class="alert alert-info">📋 La tabla se actualizará cuando el admin cargue resultados.</div>`;

  } else {
    html += `<div class="card"><table class="lb-table"><thead><tr>

      const basePts = p.stats.pts - p.stats.qualBonus - p.stats.advBonusPts;
      html += `<tr>
        <td class="rank-cell ${cls}">${emoji}</td>
        <td class="player-cell">${escHtml(p.name)}</td>

      </tr>`;
    });
    html += `</tbody></table></div>`;
  }
  container.innerHTML = html;

  }

  else if (adminTab === 'resultados') {
    html += `<div class="alert alert-warn">⚠️ Al cargar resultados los jugadores ya no pueden editar ese partido.</div>`;
    for (const r of ROUNDS) {
      html += `<div style="margin:18px 0 8px"><span style="font-weight:800;font-size:.85rem;color:var(--accent);text-transform:uppercase;letter-spacing:.05em">${r.name}</span></div>`;
      for (let i = 0; i < r.count; i++) {
        const key = `${r.id}_${i}`;
        const t = data.teams[key] || { home:'', away:'' };
        const res = data.results[key];
        html += `<div class="admin-match">
          <div style="font-size:.68rem;color:var(--text2);margin-bottom:8px">Partido ${i+1}</div>
          <div class="match-teams-grid" style="margin-bottom:8px">
            <input class="admin-inp" type="text" value="${escHtml(t.home)}" placeholder="Equipo local"
              oninput="setAdminTeam('${key}','home',this.value)" maxlength="25">
            <div class="vs">vs</div>
            <input class="admin-inp" type="text" value="${escHtml(t.away)}" placeholder="Equipo visitante"
              oninput="setAdminTeam('${key}','away',this.value)" maxlength="25">
          </div>`;
        if (res) {
          const wName = res.winner==='home'?t.home:t.away;
          html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="color:var(--gold);font-weight:700">${res.home} - ${res.away}</span>
            <span class="text-sm text-2">Avanzó: <b>${escHtml(wName)}</b></span>
          </div>
          <button class="btn btn-sm btn-danger" onclick="clearResult('${key}')">✕ Borrar</button>`;
        } else {
          html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
            <input class="score-inp-sm" type="number" min="0" max="20" placeholder="0" id="ar-${key}-h">
            <span class="text-2">-</span>
            <input class="score-inp-sm" type="number" min="0" max="20" placeholder="0" id="ar-${key}-a">
          </div>
          <div style="margin-bottom:8px">
            <div class="winner-label">¿Quién avanza?</div>
            <div class="winner-btns">
              <button class="winner-btn" id="arw-${key}-home" onclick="adminPickWinner('${key}','home')">${escHtml(t.home||'Local')}</button>
              <button class="winner-btn" id="arw-${key}-away" onclick="adminPickWinner('${key}','away')">${escHtml(t.away||'Visitante')}</button>
            </div>
          </div>
          <button class="btn btn-sm btn-primary" onclick="saveResult('${key}')">✓ Guardar resultado</button>`;
        }
        html += `</div>`;
      }
    }
  }

  else if (adminTab === 'jugadores') {
    html += `<div class="card">
      <div class="card-title">Importar jugador</div>
      <div class="form-group"><label class="form-label">Pegar código del jugador</label>
      <textarea class="form-input" id="import-code-inp" rows="3" placeholder="Código base64..."></textarea></div>
      <button class="btn btn-accent" onclick="importPlayer()">📥 Importar</button>
    </div>
    <div class="card"><div class="card-title">Jugadores (${data.players.length})</div>`;
    if (data.players.length === 0) {
      html += `<div class="empty-state"><div class="empty-icon">👥</div><p>No hay jugadores aún.</p></div>`;
    } else {
      html += `<table class="lb-table"><thead><tr><th>Nombre</th><th>Clasificados</th><th>Partidos</th><th></th></tr></thead><tbody>`;
      data.players.forEach(p => {
        const preds = data.predictions[p.id] || {};
        const q = (preds.qualifiers||[]).length;
        const matches = ROUNDS.reduce((s,r) => s + ((preds[r.id]||[]).filter(m=>m?.winner).length), 0);
        html += `<tr>
          <td class="player-cell">${escHtml(p.name)}</td>
          <td class="text-sm text-2">${q}/16</td>
          <td class="text-sm text-2">${matches}</td>
          <td style="display:flex;gap:4px">
            <button class="btn btn-sm btn-secondary" onclick="exportPlayerModal('${p.id}')">📤</button>
            <button class="btn btn-sm btn-danger" onclick="removePlayer('${p.id}')">✕</button>
          </td>
        </tr>`;
      });
      html += `</tbody></table>`;
    }
    html += `</div>`;
  }

  else if (adminTab === 'config') {
    html += `<div class="card"><div class="card-title">Cambiar contraseña</div>
      <div class="form-group"><label class="form-label">Nueva contraseña</label><input class="form-input" type="password" id="new-pass-inp"></div>
      <div class="form-group"><label class="form-label">Confirmar</label><input class="form-input" type="password" id="new-pass2-inp"></div>
      <button class="btn btn-primary" onclick="changePassword()">🔒 Guardar</button>
    </div>
    <div class="card"><div class="card-title">Backup</div>
      <button class="btn btn-secondary" onclick="exportAll()" style="margin-bottom:8px">📤 Exportar backup</button><br>
      <button class="btn btn-secondary" onclick="importAll()">📥 Importar backup</button>
      <hr class="section-sep">
      <button class="btn btn-danger" onclick="resetData()">⚠️ Resetear todo</button>
    </div>`;
  }

  container.innerHTML = html;
}

let adminWinnerDraft = {};
function adminPickWinner(key, side) {
  adminWinnerDraft[key] = side;
  ['home','away'].forEach(s => {
    const btn = document.getElementById(`arw-${key}-${s}`);
    if (btn) btn.classList.toggle('selected', s === side);
  });
}

let saveTeamTimer = null;
function setAdminTeam(key, side, val) {
  if (!data.teams[key]) data.teams[key] = { home:'', away:'' };
  data.teams[key][side] = val;
  clearTimeout(saveTeamTimer);
  saveTeamTimer = setTimeout(saveData, 800);
}

function saveResult(key) {
  const hEl = document.getElementById(`ar-${key}-h`);
  const aEl = document.getElementById(`ar-${key}-a`);
  const winner = adminWinnerDraft[key];
  if (!hEl || !aEl) return;
  const home = hEl.value === '' ? null : parseInt(hEl.value);
  const away = aEl.value === '' ? null : parseInt(aEl.value);
  if (home === null || away === null || isNaN(home) || isNaN(away)) { alert('Ingresá el marcador.'); return; }
  if (!winner) { alert('Seleccioná quién avanza.'); return; }
  data.results[key] = { home, away, winner };
  saveData();
  delete adminWinnerDraft[key];
  showToast('✅ Resultado guardado');
  renderAdmin();
}

function clearResult(key) {
  if (!confirm('¿Borrar este resultado?')) return;
  delete data.results[key]; saveData(); renderAdmin();
}

let savePoolTimer = null;
function setGroupTeamName(gi, ti, val) {
  if (!data.groups) data.groups = defaultGroups();
  if (data.groups[gi]) {
    const t = normTeam(data.groups[gi].teams[ti]);
    data.groups[gi].teams[ti] = { name: val, code: t.code };
  }
  saveData();
}
function setGroupTeamCode(gi, ti, val) {
  if (!data.groups) data.groups = defaultGroups();
  if (data.groups[gi]) {
    const t = normTeam(data.groups[gi].teams[ti]);
    data.groups[gi].teams[ti] = { name: t.name, code: val.toLowerCase().trim() };
    renderAdmin();
  }
  saveData();
}
function setPool(i, val) {
  // legacy — no-op
  saveData();
  clearTimeout(savePoolTimer);
  savePoolTimer = setTimeout(saveData, 600);
}

function toggleRealQualifier(team) {
  if (!data.realQualifiers) data.realQualifiers = [];
  const idx = data.realQualifiers.indexOf(team);
  if (idx >= 0) data.realQualifiers.splice(idx, 1);
  else {
    if (data.realQualifiers.length >= QUALIFIER_COUNT) { showToast('Ya hay 16 clasificados.'); return; }
    data.realQualifiers.push(team);
  }
  saveData(); renderAdmin();
}

// ════════════════════════════════════════════════════
// EXPORT / IMPORT
// ════════════════════════════════════════════════════

function encodePlayer(playerId) {
  const player = data.players.find(p => p.id === playerId);
  if (!player) throw new Error('not found');
  return btoa(unescape(encodeURIComponent(JSON.stringify({
    id: player.id, name: player.name,
    predictions: data.predictions[playerId] || {}
  }))));
}

function decodePlayer(code) {
  return JSON.parse(decodeURIComponent(escape(atob(code))));
}

function exportPlayerSelf() {
  if (!currentPlayer || isAdmin) return;
  savePredictions();
  const code = encodePlayer(currentPlayer.id);
  openModal('Tu código de predicciones',
    `<p class="text-sm text-2" style="margin-bottom:10px">Mandáselo al organizador por WhatsApp.</p>
     <div class="code-block" id="exp-code">${escHtml(code)}</div>
     <button class="btn btn-primary btn-full mt-3" onclick="copyCode('exp-code')">📋 Copiar código</button>`);
}

function exportPlayerModal(playerId) {
  const p = data.players.find(x => x.id === playerId);
  if (!p) return;
  const code = encodePlayer(playerId);
  openModal('Código de ' + p.name,
    `<div class="code-block" id="exp-code2">${escHtml(code)}</div>
     <button class="btn btn-primary btn-full mt-3" onclick="copyCode('exp-code2')">📋 Copiar</button>`);
}

function importPlayer() {
  const code = document.getElementById('import-code-inp')?.value?.trim();
  if (!code) return;
  try {
    const d = decodePlayer(code);
    let p = data.players.find(x => x.id === d.id);
    if (!p) { p = { id: d.id, name: d.name }; data.players.push(p); }
    else p.name = d.name;
    data.predictions[d.id] = d.predictions;
    saveData();
    document.getElementById('import-code-inp').value = '';
    showToast(`✅ ${p.name} importado`);
    renderAdmin();
  } catch(e) { alert('Código inválido.'); }
}

function removePlayer(id) {
  const p = data.players.find(x => x.id === id);
  if (!confirm(`¿Eliminar a ${p?.name}?`)) return;
  data.players = data.players.filter(x => x.id !== id);
  delete data.predictions[id]; saveData(); renderAdmin();
}

function changePassword() {
  const p1 = document.getElementById('new-pass-inp').value;
  const p2 = document.getElementById('new-pass2-inp').value;
  if (!p1) { alert('Ingresá la contraseña.'); return; }
  if (p1 !== p2) { alert('No coinciden.'); return; }
  data.adminPassword = p1; saveData(); showToast('🔒 Contraseña actualizada');
}

function exportAll() {
  const blob = new Blob([JSON.stringify(data,null,2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'prode_2026_backup.json'; a.click();
}

function importAll() {
  const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      try { data = { ...defaultData(), ...JSON.parse(ev.target.result) }; saveData(); showToast('✅ Backup importado'); renderAdmin(); }
      catch { alert('Archivo inválido.'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

function resetData() {
  if (!confirm('⚠️ Esto borra TODO. ¿Seguro?')) return;
  if (!confirm('¿Confirmás el reset?')) return;
  data = defaultData(); saveData(); showToast('🗑 Datos reseteados'); renderAdmin();
}

// ════════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════════
function openModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.add('hidden');
}

// ════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(s) { return String(s||'').replace(/'/g,"\\'"); }

function copyCode(elId) {
  const el = document.getElementById(elId);
  if (el) navigator.clipboard.writeText(el.textContent).then(()=>showToast('📋 Copiado'));
}

let toastTimer = null;
function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div'); t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1f2937;border:1px solid #374151;color:#f9fafb;padding:10px 20px;border-radius:10px;font-size:.85rem;font-weight:600;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:opacity .3s;white-space:nowrap;font-family:Poppins,sans-serif';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.style.opacity='0'; }, 2500);
}

// Enter key handlers
document.getElementById('player-name-inp').addEventListener('keydown', e => { if(e.key==='Enter') loginPlayer(); });
document.getElementById('admin-pass-inp').addEventListener('keydown', e => { if(e.key==='Enter') loginAdmin(); });
</script>
